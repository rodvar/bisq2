muSig.trade.guide.process.content=бһ“бҹ…бһ–бҹҒбһӣбһҠбҹӮбһӣбһўбҹ’бһ“бһҖбһҷбһҖбһҖбһ¶бһҡбһ•бҹ’бһҸбһӣбҹӢбһҮбһјбһ“ бһўбҹ’бһ“бһҖбһ“бһ№бһ„бһҮбҹ’бһҡбһҫбһҹбһҡбһҫбһҹбһҮбһҳбҹ’бһҡбһҫбһҹбһҠбҹӮбһӣбһҳбһ¶бһ“бһҹбҹ’бһҡбһ¶бһ”бҹӢ бһ“бһ·бһ„бһ–бһ·бһ“бһ·бһҸбҹ’бһҷбһҳбһҫбһӣбһҹбһ„бҹ’бһҒбҹҒбһ”бһҳбһ»бһ“бһ–бҹҒбһӣбһ…бһ¶бһ”бҹӢбһ•бҹ’бһҸбһҫбһҳбҹ”\
бһҳбһҪбһҷбһҠбһ„бһ”бһ¶бһ“бһ…бһ¶бһ”бҹӢбһ•бҹ’бһҸбһҫбһҳ бһўбҹҠбһ·бһ“бһ’бһҫбһ бҹ’бһңбҹҒбһҹбһўбҹ’бһ“бһҖбһ”бҹ’бһҡбһҫбһ”бҹ’бһҡбһ¶бһҹбҹӢбһ“бһ№бһ„бһҺбҹӮбһ“бһ¶бҹҶбһўбҹ’бһ“бһҖбһҸбһ¶бһҳбһҮбҹҶбһ бһ¶бһ“бһ‘бһ¶бҹҶбһ„бһ“бҹҒбҹҮ:
muSig.trade.guide.process.steps=- бһ”бһ“бҹ’бһ‘бһ¶бһ”бҹӢбһ–бһёбһ”бҹ’бһҡбһҸбһ·бһ”бһҸбҹ’бһҸбһ·бһҖбһ¶бһҡбһҠбһ¶бһҖбҹӢбһ”бҹ’бһҡбһ¶бһҖбҹӢбһҸбҹ’бһҡбһјбһңбһ”бһ¶бһ“бһ…бҹҒбһүбһ•бҹ’бһҹбһ¶бһҷ бһўбҹ’бһ“бһҖбһҮбһҪбһүбһҠбһјбһҡбһҸбҹ’бһҡбһјбһңбһҡбһ„бҹӢбһ…бһ¶бҹҶбһҖбһ¶бһҡбһ”бһүбҹ’бһҮбһ¶бһҖбҹӢбһҳбһҪбһҷбһ“бҹ…бһӣбһҫ blockchainбҹ”\n- бһ”бһ“бҹ’бһ‘бһ¶бһ”бҹӢбһ–бһёбһҖбһ¶бһҡбһ”бһүбҹ’бһҮбһ¶бһҖбҹӢ бһўбҹ’бһ“бһҖбһ‘бһ·бһүбһ•бҹ’бһүбһҫбһ”бҹ’бһҡбһ¶бһҖбҹӢбһҡбһјбһ”бһ·бһҷбһңбһҸбҹ’бһҗбһ» бһ“бһ·бһ„бһҹбһҳбҹ’бһӮбһ¶бһӣбҹӢбһҗбһ¶бһ”бҹ’бһҡбһ¶бһҖбҹӢбһ”бһ¶бһ“бһ…бһ¶бһ”бҹӢбһ•бҹ’бһҸбһҫбһҳбҹ” бһҸбһ¶бһҳбһҠбһ¶бһ“бһҖбһ¶бһҡбһҺбҹӮбһ“бһ¶бҹҶбһҡбһ”бһҹбҹӢбһҖбһҳбҹ’бһҳбһңбһ·бһ’бһёбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһҳбһјбһӣбһ бҹҒбһҸбһ»бһ‘бһјбһ‘бһ¶бһҸбҹӢ (бһ‘бһ»бһҖбһңбһ¶бһІбҹ’бһҷбһ‘бһ‘бҹҒбһ¬бһ”бҹ’бһҡбһҫбһҲбҹ’бһҳбҹ„бҹҮбһ–бҹҒбһүбһҡбһ”бһҹбҹӢбһўбҹ’бһ“бһҖ)бҹ”\n- бһ–бҹҒбһӣбһҠбҹӮбһӣбһўбҹ’бһ“бһҖбһӣбһҖбҹӢбһ‘бһ‘бһҪбһӣбһ”бҹ’бһҡбһ¶бһҖбҹӢбһ”бһ¶бһ“ бһ–бһҪбһҖбһӮбҹҒбһ”бһүбҹ’бһҮбһ¶бһҖбҹӢбһҖбһ¶бһҡбһ‘бһ‘бһҪбһӣбһ“бҹ…бһҖбҹ’бһ“бһ»бһ„бһҖбһҳбҹ’бһҳбһңбһ·бһ’бһё Bisq бһҠбһҫбһҳбҹ’бһ”бһёбһ”бһүбҹ’бһ…бһ”бҹӢбһҖбһ¶бһҡбһҮбһҪбһүбһҠбһјбһҡбҹ”

muSig.trade.guide.rules.headline=бһҸбһҫбһҒбҹ’бһүбһ»бҹҶбһҸбҹ’бһҡбһјбһңбһҠбһ№бһ„бһўбҹ’бһңбһёбһҒбҹ’бһӣбҹҮбһўбҹҶбһ–бһёбһ…бҹ’бһ”бһ¶бһ”бҹӢбһҮбһҪбһүбһҠбһјбһҡ?
muSig.trade.guide.rules.content=- бһ”бһ“бҹ’бһ‘бһ¶бһ”бҹӢбһ–бһёбһҖбһ¶бһҡбһҮбһҪбһүбһҠбһјбһҡвҖӢбһ”бһ¶бһ“бһ…бһ¶бһ”бҹӢбһ•бҹ’бһҸбһҫбһҳ бһңбһ¶вҖӢбһҳбһ·бһ“бһўбһ¶бһ…бһҸбҹ’бһҡбһјбһңбһ”бһ¶бһ“бһ”бҹ„бҹҮбһ”бһ„бҹӢбһҠбҹ„бһҷбһӮбҹ’бһҳбһ¶бһ“бһҳбһјбһӣбһ бҹҒбһҸбһ»бһҠбҹӮбһӣбһҳбһ¶бһ“бһҹбһ»бһ–бһӣбһ—бһ¶бһ–бҹ”\n- бһ–бһ·бһ“бһ·бһҸбҹ’бһҷбһҹбһ¶бһҡбһ”бҹ’бһҡбһ…бһ¶бҹҶ, бһҶбҹ’бһӣбһҫбһҷбһҸбһ”бһҷбҹүбһ¶бһ„бһҶбһ¶бһ”бҹӢбһҡбһ бҹҗбһҹ (бһҖбҹ’бһ“бһ»бһ„бһҡбһҷбҹҲбһ–бҹҒбһӣ бҹӨбҹЁ бһҳбҹүбҹ„бһ„бһҖбҹ’бһ“бһ»бһ„бһҖбһ¶бһҡбһўбһ“бҹ’бһҸбһҡбһ¶бһӮбһҳбһ“бҹҚ), бһ“бһ·бһ„бһҡбһҖбҹ’бһҹбһ¶бһ‘бһ»бһҖбһҖбһ¶бһҡбһ”бҹ’бһҡбһ¶бһҹбҹ’бһҡбҹҗбһҷбһ‘бһ¶бһҖбҹӢбһ‘бһ„бһ‘бһ¶бҹҶбһ„бһўбһҹбҹӢбһ“бҹ…бһҖбҹ’бһ“бһ»бһ„бһҖбһ¶бһҡбһҮбһҮбҹӮбһҖ Bisqбҹ”\n- бһ”бҹ’бһҡбһҫбһ‘бһ·бһ“бҹ’бһ“бһ“бҹҗбһҷбһӮбһҺбһ“бһёбһ‘бһјбһ‘бһ¶бһҸбҹӢбһҠбҹӮбһӣбһҸбҹ’бһҡбһ№бһҳбһҸбҹ’бһҡбһјбһңбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһҖбһ¶бһҡбһ•бҹ’бһ‘бҹҒбһҡбһ”бҹ’бһҡбһ¶бһҖбҹӢ fiatбҹ”\n- бһ”бҹ„бҹҮбһ‘бһ»бһҖбһңбһ¶бһӣ 'бһҳбһјбһӣбһ бҹҒбһҸбһ»бһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһҖбһ¶бһҡбһ‘бһјбһ‘бһ¶бһҸбҹӢ' бһІбҹ’бһҷбһ‘бһ‘бҹҒ бһ”бҹ’бһҡбһҹбһ·бһ“бһ”бһҫбһўбһ¶бһ…; бһ”бһҫбһҳбһ·бһ“бһҠбһјбһ…бҹ’бһ“бҹ„бҹҮбһ‘бҹҒ бһ”бҹ’бһҡбһҫбһҲбҹ’бһҳбҹ„бҹҮбһҡбһ”бһҹбҹӢбһўбҹ’бһ“бһҖбҹ” бһҖбһ»бҹҶбһ”бһүбҹ’бһ…бһјбһӣ 'Bisq' бһ¬ 'Bitcoin'бҹ”\n- бһ”бҹ’бһҡбһҹбһ·бһ“бһ”бһҫбһ’бһ“бһ¶бһӮбһ¶бһҡбһҡбһ”бһҹбҹӢбһўбҹ’бһ“бһҖбһ•бҹ’бһүбһҫбһӮбһ·бһҸбһҗбҹ’бһӣбҹғ бһҹбһјбһҳбһўбҹ’бһ“бһҖбһ•бҹ’бһүбһҫбһӮбһ·бһҸбһҗбҹ’бһӣбҹғбһ‘бһ¶бҹҶбһ„бһўбһҹбҹӢбҹ”\n- бһ“бҹ…бһ–бҹҒбһӣбһ‘бһ‘бһҪбһӣбһ”бһ¶бһ“бһҖбһ¶бһҡбһ‘бһјбһ‘бһ¶бһҸбҹӢ бһўбҹ’бһ“бһҖбһӣбһҖбҹӢбһҸбҹ’бһҡбһјбһңбһҸбҹӮбһ•бҹ’бһ‘бҹҖбһ„бһ•бҹ’бһ‘бһ¶бһҸбҹӢбһҗбһ¶бһ‘бһ·бһ“бҹ’бһ“бһ“бҹҗбһҷбһҖбһ¶бһҡбһ‘бһ‘бһҪбһӣбһҸбҹ’бһҡбһјбһңбһ“бһ№бһ„бһ–бҹҗбһҸбҹҢбһҳбһ¶бһ“бһӮбһҺбһ“бһёбһҡбһ”бһҹбҹӢбһўбҹ’бһ“бһҖбһ‘бһ·бһүбҹ” бһ”бҹ’бһҡбһҹбһ·бһ“бһ”бһҫбһңбһ¶бһҳбһ·бһ“бһҸбҹ’бһҡбһ№бһҳбһҸбҹ’бһҡбһјбһң бһҹбһјбһҳбһ”бһҫбһҖбһҖбһҡбһҺбһёбһўбһ“бҹ’бһҸбһҡбһ¶бһӮбһҳбһ“бҹҚбҹ”\n- бһ”бһүбҹ’бһ…бһ”бҹӢбһҖбһ¶бһҡбһҮбһҪбһүбһҠбһјбһҡвҖӢбһҖбҹ’бһ“бһ»бһ„бһҡбһҷбҹҲбһ–бҹҒбһӣбһҮбһҪбһүбһҠбһјбһҡ бһ“бһ·бһ„бһҳбһ¶бһ“бһўбһ“бһЎбһ¶бһүбһҷбҹүбһ¶бһ„бһ бҹ„бһ…бһҺбһ¶бһҹбҹӢбһҡбҹҖбһ„бһҡбһ¶бһӣбҹӢбһҗбҹ’бһ„бҹғбҹ”\n- бһ”бҹ’бһҡбһҹбһ·бһ“бһ”бһҫбһҳбһ¶бһ“бһ”бһүбҹ’бһ бһ¶ бһҹбһјбһҳбһ”бһҫбһҖбһўбһ“бҹ’бһҸбһҡбһ¶бһӮбһҳбһ“бҹҚбһҮбһ¶бһҮбҹҶбһ бһ¶бһ“бһҠбҹҶбһ”бһјбһ„бһҖбҹ’бһ“бһ»бһ„бһҖбһ¶бһҡбһӣбһҫбһҖбһҖбһҳбҹ’бһҡбһ·бһҸ; бһўбһ“бҹ’бһҸбһҡбһҖбһ¶бһҡбһёбһўбһ¶бһ…бһ…бҹҶбһҺбһ¶бһҷбһ–бҹҒбһӣбһҡбһ бһјбһҸбһҠбһӣбҹӢ бҹӨбҹЁ бһҳбҹүбҹ„бһ„бһҠбһҫбһҳбҹ’бһ”бһёбһҶбҹ’бһӣбһҫбһҷбһҸбһ”бҹ”\n- бһ”бҹ’бһҡбһҹбһ·бһ“бһ”бһҫбһҖбһ¶бһҡбһўбһ“бҹ’бһҸбһҡбһ¶бһӮбһҳбһ“бҹҚбһҸбҹ’бһҡбһјбһңбһ”бһ¶бһ“бһ”бһҠбһ·бһҹбҹҒбһ’бһҠбҹ„бһҷбһўбҹ’бһ“бһҖбһҮбһҪбһүбһҠбһјбһҡвҖӢбһҺбһ¶бһҳбһҪбһҷ бһҖбһ¶бһҡбһҮбһҪбһүбһҠбһјбһҡвҖӢбһ“бһ№бһ„бһ…бһјбһӣбһ‘бҹ…бһҖбҹ’бһ“бһ»бһ„бһҖбһ¶бһҡбһўбһ¶бһҮбҹ’бһүбһ¶бһҖбһҺбҹ’бһҸбһ¶бһӣбҹ” бһңбһ¶бһ“бһ№бһ„бһўбһ¶бһ…бһ”бҹ’бһҡбһҫбһ”бһ¶бһ“бһҸбҹӮбһ”бһ“бҹ’бһ‘бһ¶бһ”бҹӢбһ–бһёбһҖбһ¶бһҡбһ…бһ¶бһҖбҹӢбһ–бҹҒбһӣ (бҹҘ бһҗбҹ’бһ„бҹғбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһҖбһ¶бһҡбһҮбһҪбһүбһҠбһјбһҡ altcoin, бҹўбҹ  бһҗбҹ’бһ„бҹғбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһҖбһ¶бһҡбһҮбһҪбһүбһҠбһјбһҡ fiat)бҹ”
muSig.trade.guide.rules.confirm=бһҒбҹ’бһүбһ»бҹҶбһ”бһ¶бһ“бһўбһ¶бһ“бһ“бһ·бһ„бһҷбһӣбҹӢбһҠбһ№бһ„


######################################################
# Mediation
######################################################

muSig.mediation.request.confirm.headline=бһҹбҹ’бһ“бһҫбһҹбһ»бҹҶбһўбһ¶бһҮбҹ’бһүбһ¶бһҖбһҺбҹ’бһҸбһ¶бһӣ
muSig.mediation.request.confirm.msg=бһ”бҹ’бһҡбһҹбһ·бһ“бһ”бһҫбһўбҹ’бһ“бһҖбһҳбһ¶бһ“бһ”бһүбҹ’бһ бһ¶бһҠбҹӮбһӣбһўбҹ’бһ“бһҖбһҳбһ·бһ“бһўбһ¶бһ…бһҠбҹ„бҹҮбһҹбҹ’бһҡбһ¶бһҷбһҮбһ¶бһҳбһҪбһҷбһҠбҹғбһӮбһјбһҮбһҪбһүбһҠбһјбһҡбһҡбһ”бһҹбҹӢбһўбҹ’бһ“бһҖ бһўбҹ’бһ“бһҖбһўбһ¶бһ…бһҹбҹ’бһ“бһҫбһҹбһ»бҹҶбһҮбҹҶбһ“бһҪбһҷбһ–бһёбһўбһ“бҹ’бһҸбһҡбһҖбһ¶бһҡбһёбҹ”\n\nбһҹбһјбһҳбһҖбһ»бҹҶбһҹбҹ’бһ“бһҫбһҹбһ»бҹҶбһҖбһ¶бһҡбһҮбһҪбһҷбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһҹбҹҶбһҺбһҪбһҡбһ‘бһјбһ‘бҹ…бҹ” бһ“бҹ…бһҖбҹ’бһ“бһ»бһ„бһ•бҹ’бһ“бҹӮбһҖбһӮбһ¶бҹҶбһ‘бҹ’бһҡ бһҳбһ¶бһ“бһ”бһ“бҹ’бһ‘бһ”бҹӢбһҮбһҮбҹӮбһҖбһҠбҹӮбһӣбһўбҹ’бһ“бһҖбһўбһ¶бһ…бһ‘бһ‘бһҪбһӣбһ”бһ¶бһ“бһҷбҹ„бһ”бһӣбҹӢбһ“бһ·бһ„бһҮбҹҶбһ“бһҪбһҷбһ‘бһјбһ‘бҹ…бҹ”
